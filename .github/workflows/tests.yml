name: tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: pure-node unit suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # No dependencies to install — the suite is pure Node (node:test + node:assert),
      # with a local THREE stub so THREE-coupled math (lonLatToScene) runs headless.
      - name: Run test suite
        run: npm test
